global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'agrilink-auth'
    static_configs:
      - targets: ['auth-service:4001']
    metrics_path: '/auth/metrics'

  - job_name: 'agrilink-farmer'
    static_configs:
      - targets: ['farmer-service:4002']
    metrics_path: '/farmer/metrics'

  - job_name: 'agrilink-supplier'
    static_configs:
      - targets: ['supplier-service:4003']
    metrics_path: '/supplier/metrics'

  - job_name: 'agrilink-marketplace'
    static_configs:
      - targets: ['marketplace-service:4004']
    metrics_path: '/marketplace/metrics'

  - job_name: 'agrilink-ml'
    static_configs:
      - targets: ['ml-service:4006']
    metrics_path: '/metrics'

  - job_name: 'agrilink-blockchain'
    static_configs:
      - targets: ['blockchain-service:4007']
    metrics_path: '/blockchain/metrics'
