events {
  worker_connections 1024;
  use epoll;
}

http {
  # ── Upstream Services ─────────────────────────────────────────
  upstream auth        { server host.docker.internal:4001; keepalive 32; }
  upstream farmer      { server host.docker.internal:4002; keepalive 32; }
  upstream supplier    { server host.docker.internal:4003; keepalive 32; }
  upstream marketplace { server host.docker.internal:4004; keepalive 32; }
  upstream ml          { server host.docker.internal:4006; keepalive 16; }
  upstream blockchain  { server host.docker.internal:4007; keepalive 16; }
  upstream notification { server host.docker.internal:4005; keepalive 16; }

  # ── Global Settings ───────────────────────────────────────────
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  gzip on;
  gzip_types application/json text/plain;
  gzip_min_length 1024;

  # ── Rate Limiting Zones ───────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=100r/s;
  limit_req_zone $binary_remote_addr zone=api_zone:20m rate=200r/s;

  # ── Main Server ───────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Request ID for tracing
    add_header X-Request-ID $request_id always;
    add_header X-Content-Type-Options nosniff;
    add_header Content-Security-Policy "frame-ancestors 'self' http://localhost:3000 http://localhost:8080;";

    # ── Auth ──────────────────────────────────────────────────
    location /auth/ {
      limit_req zone=auth_zone burst=20 nodelay;
      proxy_pass http://auth;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";
      proxy_set_header Cookie $http_cookie;
      proxy_set_header Authorization $http_authorization;
      proxy_read_timeout 30s;
    }

    # ── Farmer ────────────────────────────────────────────────
    location /farmer/ {
      limit_req zone=api_zone burst=30 nodelay;
      proxy_pass http://farmer;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";
      proxy_set_header Cookie $http_cookie;
      proxy_set_header Authorization $http_authorization;
      proxy_read_timeout 60s;
      client_max_body_size 20M;
    }

    # ── Supplier ──────────────────────────────────────────────
    location /supplier/ {
      limit_req zone=api_zone burst=30 nodelay;
      proxy_pass http://supplier;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";
      proxy_set_header Cookie $http_cookie;
      proxy_set_header Authorization $http_authorization;
      proxy_read_timeout 60s;
      client_max_body_size 20M;
    }

    # ── Marketplace ───────────────────────────────────────────
    location /marketplace/ {
      limit_req zone=api_zone burst=30 nodelay;
      proxy_pass http://marketplace;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";
      proxy_set_header Cookie $http_cookie;
      proxy_set_header Authorization $http_authorization;
      proxy_read_timeout 30s;
    }

    # ── ML / Predictions ──────────────────────────────────────
    location /ml/ {
      limit_req zone=api_zone burst=10 nodelay;
      proxy_pass http://ml;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 120s;    # ML inference can be slow
    }

    # ── Blockchain ────────────────────────────────────────────
    location /blockchain/ {
      limit_req zone=api_zone burst=10 nodelay;
      proxy_pass http://blockchain;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";
      proxy_set_header Cookie $http_cookie;
      proxy_set_header Authorization $http_authorization;
      proxy_read_timeout 120s;
      client_max_body_size 20M;
    }

    # ── Gateway Health ────────────────────────────────────────
    location /health {
      access_log off;
      return 200 '{"status":"ok","gateway":"agrilink"}';
      add_header Content-Type application/json;
    }

    # ── Notification (SSE) ────────────────────────────────────
    location /notification/ {
      proxy_pass http://notification;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      # Disable buffering for SSE
      proxy_buffering off;
      proxy_cache off;
      proxy_set_header Connection '';
      chunked_transfer_encoding off;
      proxy_read_timeout 24h;
    }

    # ── Default ───────────────────────────────────────────────
    location / {
      return 404 '{"success":false,"error":"Route not found"}';
      add_header Content-Type application/json;
    }
  }
}
