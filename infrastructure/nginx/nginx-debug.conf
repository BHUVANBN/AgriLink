events {
  worker_connections 1024;
}

http {
  # ── Upstream Services (Point to Host IP on Docker Bridge) ─────
  # Using 172.20.0.1 which is the gateway for agrilink-net
  upstream auth        { server 172.20.0.1:4001; }
  upstream farmer      { server 172.20.0.1:4002; }
  upstream supplier    { server 172.20.0.1:4003; }
  upstream marketplace { server 172.20.0.1:4004; }
  upstream ml          { server 172.20.0.1:4006; }
  upstream blockchain  { server 172.20.0.1:4007; }
  upstream notification { server 172.20.0.1:4005; }

  server {
    listen 80;
    
    # ── Internal Debug Routes ─────────────────────────────────
    location /health {
      return 200 '{"status":"ok","gateway":"agrilink-debug"}';
    }

    # ── Proxy Configuration ───────────────────────────────────
    # We do NOT add CORS headers here because the backend services
    # (Fastify/Node) are already configured with @fastify/cors.
    # Adding them here causes "Multiple Header Values" which breaks the browser.

    location /auth/ {
      proxy_pass http://auth;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /farmer/ {
      proxy_pass http://farmer;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      client_max_body_size 25M;
    }

    location /ml/ {
      proxy_pass http://ml;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }
    
    location /static/ {
       # Serve static maps from ML service
       proxy_pass http://ml/ml/static/;
    }
  }
}
