events {
  worker_connections 1024;
}

pid /tmp/nginx.pid;

http {
  client_max_body_size 25M;
  client_body_temp_path /home/batman/AgriLink_v2/infrastructure/nginx/tmp/client_body;
  proxy_temp_path       /home/batman/AgriLink_v2/infrastructure/nginx/tmp/proxy;
  fastcgi_temp_path     /home/batman/AgriLink_v2/infrastructure/nginx/tmp/fastcgi;
  uwsgi_temp_path       /home/batman/AgriLink_v2/infrastructure/nginx/tmp/uwsgi;
  scgi_temp_path        /home/batman/AgriLink_v2/infrastructure/nginx/tmp/scgi;
  access_log /dev/stdout;
  error_log /dev/stderr;

  upstream auth        { server 127.0.0.1:4001; }
  upstream farmer      { server 127.0.0.1:4002; }
  upstream supplier    { server 127.0.0.1:4003; }
  upstream marketplace { server 127.0.0.1:4004; }
  upstream ml          { server 127.0.0.1:4006; }
  upstream blockchain  { server 127.0.0.1:4007; }
  upstream notification { server 127.0.0.1:4005; }

  server {
    listen 8080;
    server_name localhost;

    # Global CORS setup
    add_header 'Access-Control-Allow-Origin' 'http://localhost:3000' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;

    location / {
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' 'http://localhost:3000' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
      }
    }

    location /auth          { 
      proxy_hide_header 'Access-Control-Allow-Origin';
      proxy_hide_header 'Access-Control-Allow-Methods';
      proxy_hide_header 'Access-Control-Allow-Headers';
      proxy_hide_header 'Access-Control-Allow-Credentials';
      proxy_pass http://127.0.0.1:4001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /farmer        { 
      proxy_hide_header 'Access-Control-Allow-Origin';
      proxy_hide_header 'Access-Control-Allow-Methods';
      proxy_hide_header 'Access-Control-Allow-Headers';
      proxy_hide_header 'Access-Control-Allow-Credentials';
      proxy_pass http://farmer;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /supplier      { 
      proxy_hide_header 'Access-Control-Allow-Origin';
      proxy_hide_header 'Access-Control-Allow-Methods';
      proxy_hide_header 'Access-Control-Allow-Headers';
      proxy_hide_header 'Access-Control-Allow-Credentials';
      proxy_pass http://supplier;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /marketplace   { 
      proxy_hide_header 'Access-Control-Allow-Origin';
      proxy_hide_header 'Access-Control-Allow-Methods';
      proxy_hide_header 'Access-Control-Allow-Headers';
      proxy_hide_header 'Access-Control-Allow-Credentials';
      proxy_pass http://marketplace;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /ml            { 
      proxy_hide_header 'Access-Control-Allow-Origin';
      proxy_hide_header 'Access-Control-Allow-Methods';
      proxy_hide_header 'Access-Control-Allow-Headers';
      proxy_hide_header 'Access-Control-Allow-Credentials';
      proxy_pass http://ml;
      proxy_set_header Host $host;
    }
    location /blockchain    { 
      proxy_hide_header 'Access-Control-Allow-Origin';
      proxy_hide_header 'Access-Control-Allow-Methods';
      proxy_hide_header 'Access-Control-Allow-Headers';
      proxy_hide_header 'Access-Control-Allow-Credentials';
      proxy_pass http://blockchain;
      proxy_set_header Host $host;
    }
    location /notification  { 
      rewrite /notification/(.*) /$1 break;
      proxy_pass http://notification;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
    location /health        { return 200 '{"status":"ok","gateway":"local-agrilink"}'; add_header Content-Type application/json; }
  }
}
