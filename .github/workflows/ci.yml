name: AgriLink CI/CD 🌾

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: bitnami/mongodb:latest
        ports:
          - 27017:27017
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agrilink
          POSTGRES_PASSWORD: password
          POSTGRES_DB: agrilink_test
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Prisma Generate
        run: pnpm recursive exec prisma generate

      - name: Lint
        run: pnpm recursive run lint

      - name: Unit Tests
        run: pnpm recursive run test
        env:
          DATABASE_URL: postgres://agrilink:password@localhost:5432/agrilink_test
          JWT_ACCESS_SECRET: CI_TEST_SECRET
